<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>タスク — Todo</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --ground:        #F2F1EC;
  --surface:       #FFFFFF;
  --surface-hover: #FAFAF8;
  --text:          #1C1B18;
  --text-secondary:#6B6963;
  --text-muted:    #A8A6A0;
  --accent:        #3B4DA0;
  --accent-hover:  #2E3D82;
  --accent-faint:  #EDF0FA;
  --border:        #E0DED6;
  --border-hover:  #C8C6BC;
  --done-color:    #B8B6B0;
  --danger:        #B84040;
  --shadow-card:   0 1px 2px rgba(28,27,24,.06), 0 6px 20px rgba(28,27,24,.07);
}

html, body {
  min-height: 100vh;
  background: var(--ground);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "Hiragino Kaku Gothic ProN",
               "Hiragino Sans", "Yu Gothic UI", Meiryo, "Segoe UI", sans-serif;
  font-size: 15px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* ─── Layout ─── */
.app {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 52px 16px 96px;
}

/* ─── Header ─── */
.header {
  width: 100%;
  max-width: 480px;
  margin-bottom: 20px;
}

.header-eyebrow {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 2px;
}

.header-row {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
}

.header-title {
  font-size: 30px;
  font-weight: 700;
  letter-spacing: -0.04em;
  line-height: 1.1;
  color: var(--text);
}

.header-badge {
  font-size: 12px;
  font-weight: 600;
  color: var(--accent);
  background: var(--accent-faint);
  padding: 3px 9px;
  border-radius: 20px;
  letter-spacing: 0.02em;
  transition: opacity 0.2s;
}

.header-badge.hidden { opacity: 0; pointer-events: none; }

/* ─── Card ─── */
.card {
  width: 100%;
  max-width: 480px;
  background: var(--surface);
  border-radius: 14px;
  box-shadow: var(--shadow-card);
  overflow: hidden;
}

/* ─── Input area ─── */
.input-area {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 14px 18px;
  border-bottom: 1px solid var(--border);
}

.input-plus {
  width: 20px;
  height: 20px;
  color: var(--text-muted);
  flex-shrink: 0;
  transition: color 0.15s;
}

.input-area:focus-within .input-plus {
  color: var(--accent);
}

.new-todo {
  flex: 1;
  border: none;
  outline: none;
  font-size: 15px;
  font-family: inherit;
  color: var(--text);
  background: transparent;
  caret-color: var(--accent);
}

.new-todo::placeholder { color: var(--text-muted); }

.add-btn {
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 7px;
  padding: 6px 15px;
  font-size: 13px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  letter-spacing: 0.02em;
  transition: background 0.15s, transform 0.1s;
  flex-shrink: 0;
}

.add-btn:hover  { background: var(--accent-hover); }
.add-btn:active { transform: scale(0.96); }

/* ─── Filter bar ─── */
.filter-bar {
  display: flex;
  background: var(--ground);
  border-bottom: 1px solid var(--border);
}

.filter-btn {
  flex: 1;
  padding: 9px 4px;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.05em;
  font-family: inherit;
  color: var(--text-secondary);
  background: transparent;
  border: none;
  cursor: pointer;
  position: relative;
  transition: color 0.15s;
}

.filter-btn::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 0;
  height: 2px;
  background: var(--accent);
  border-radius: 2px 2px 0 0;
  transition: width 0.22s cubic-bezier(.4,0,.2,1);
}

.filter-btn.active           { color: var(--accent); }
.filter-btn.active::after    { width: calc(100% - 20px); }

/* ─── Todo list ─── */
.todo-list {
  list-style: none;
}

/* ─── Todo item ─── */
.todo-item {
  display: flex;
  align-items: center;
  gap: 13px;
  padding: 13px 18px;
  border-bottom: 1px solid var(--border);
  transition: background 0.12s;
  position: relative;
}

.todo-item:last-child    { border-bottom: none; }
.todo-item:hover         { background: var(--surface-hover); }

/* Slide-in for new items */
@keyframes item-in {
  from { opacity: 0; transform: translateY(-6px); }
  to   { opacity: 1; transform: translateY(0); }
}

.todo-item.new-item {
  animation: item-in 0.22s ease forwards;
}

/* ─── Checkbox ─── */
.checkbox {
  width: 19px;
  height: 19px;
  border-radius: 50%;
  border: 1.5px solid var(--border-hover);
  flex-shrink: 0;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  background: transparent;
  transition: border-color 0.18s, background 0.18s;
}

.checkbox:hover {
  border-color: var(--accent);
  background: var(--accent-faint);
}

.todo-item.completed .checkbox {
  background: var(--accent);
  border-color: var(--accent);
}

/* SVG checkmark — stroke-dashoffset animation */
.checkmark {
  width: 10px;
  height: 10px;
  overflow: visible;
  fill: none;
  stroke: #fff;
  stroke-width: 2.2;
  stroke-linecap: round;
  stroke-linejoin: round;
  stroke-dasharray: 11;
  stroke-dashoffset: 11;
  transition: stroke-dashoffset 0.28s cubic-bezier(.4,0,.2,1);
}

.todo-item.completed .checkmark {
  stroke-dashoffset: 0;
}

/* ─── Text wrapper ─── */
.text-wrap {
  flex: 1;
  min-width: 0;
  position: relative;
}

/* ─── Display text ─── */
.todo-text {
  display: block;
  font-size: 15px;
  color: var(--text);
  word-break: break-word;
  cursor: default;
  user-select: none;
  position: relative;
  transition: color 0.22s;
}

/* Ink-stroke strikethrough: draws left→right */
.todo-text::after {
  content: '';
  position: absolute;
  left: 0;
  top: calc(50% + 0.5px);
  width: 0;
  height: 1.5px;
  background: var(--done-color);
  border-radius: 1px;
  transition: width 0.36s cubic-bezier(.4,0,.2,1);
}

.todo-item.completed .todo-text         { color: var(--done-color); }
.todo-item.completed .todo-text::after  { width: 100%; }

/* ─── Edit input ─── */
.edit-input {
  display: block;
  width: 100%;
  border: none;
  border-bottom: 1.5px solid var(--accent);
  outline: none;
  font-size: 15px;
  font-family: inherit;
  color: var(--text);
  background: transparent;
  padding-bottom: 1px;
  caret-color: var(--accent);
}

/* ─── Delete button ─── */
.delete-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  background: none;
  border: none;
  color: var(--text-muted);
  cursor: pointer;
  padding: 4px;
  border-radius: 5px;
  flex-shrink: 0;
  opacity: 0;
  transition: opacity 0.15s, color 0.15s, background 0.15s;
}

.todo-item:hover .delete-btn  { opacity: 1; }
.delete-btn:hover              { color: var(--danger); background: #FDF0F0; }

/* ─── Empty state ─── */
.empty {
  padding: 48px 24px;
  text-align: center;
}

.empty-icon {
  display: block;
  width: 36px;
  height: 36px;
  margin: 0 auto 10px;
  color: var(--border-hover);
}

.empty-text {
  font-size: 13px;
  color: var(--text-muted);
  line-height: 1.7;
}

/* ─── Footer ─── */
.footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 11px 18px;
  background: #F8F7F2;
  border-top: 1px solid var(--border);
}

.footer-count {
  font-size: 12px;
  color: var(--text-muted);
  letter-spacing: 0.02em;
}

.clear-btn {
  font-size: 12px;
  font-family: inherit;
  color: var(--text-muted);
  background: none;
  border: none;
  cursor: pointer;
  padding: 3px 0;
  transition: color 0.15s;
}

.clear-btn:hover:not(:disabled) { color: var(--danger); }

.clear-btn:disabled {
  opacity: 0.35;
  cursor: default;
}

/* ─── Focus styles ─── */
:focus-visible {
  outline: 2px solid var(--accent);
  outline-offset: 2px;
}

/* ─── Reduced motion ─── */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    transition-duration: 0.01ms !important;
    animation-duration: 0.01ms !important;
  }
}
</style>
</head>
<body>

<div class="app">

  <header class="header" role="banner">
    <p class="header-eyebrow" id="today-date" aria-live="off"></p>
    <div class="header-row">
      <h1 class="header-title">タスク</h1>
      <span class="header-badge hidden" id="active-badge" aria-live="polite"></span>
    </div>
  </header>

  <main class="card" aria-label="タスク管理">

    <div class="input-area">
      <svg class="input-plus" viewBox="0 0 20 20" fill="none"
           stroke="currentColor" stroke-width="1.6" stroke-linecap="round"
           aria-hidden="true">
        <circle cx="10" cy="10" r="7.5"/>
        <line x1="10" y1="6.5" x2="10" y2="13.5"/>
        <line x1="6.5" y1="10" x2="13.5" y2="10"/>
      </svg>
      <input
        id="new-todo"
        type="text"
        class="new-todo"
        placeholder="タスクを追加..."
        autocomplete="off"
        autocorrect="off"
        maxlength="200"
        aria-label="新しいタスク"
      >
      <button class="add-btn" id="add-btn">追加</button>
    </div>

    <nav class="filter-bar" role="tablist" aria-label="表示フィルター">
      <button class="filter-btn active" role="tab" aria-selected="true"  data-filter="all">すべて</button>
      <button class="filter-btn"        role="tab" aria-selected="false" data-filter="active">未完了</button>
      <button class="filter-btn"        role="tab" aria-selected="false" data-filter="completed">完了</button>
    </nav>

    <ul class="todo-list" id="todo-list" aria-label="タスク一覧" aria-live="polite" aria-relevant="additions removals"></ul>

    <footer class="footer">
      <span class="footer-count" id="footer-count" aria-live="polite"></span>
      <button class="clear-btn" id="clear-btn">完了を削除</button>
    </footer>

  </main>

</div>

<script>
(function () {
  'use strict';

  /* ── State ── */
  var todos   = [];
  var filter  = 'all';
  var editing = null; // id being edited

  /* ── Persist ── */
  function load() {
    try { todos = JSON.parse(localStorage.getItem('__todo_v1') || '[]'); }
    catch (_) { todos = []; }
  }
  function save() {
    try { localStorage.setItem('__todo_v1', JSON.stringify(todos)); }
    catch (_) {}
  }

  /* ── Mutations ── */
  function add(text) {
    text = text.trim();
    if (!text) return false;
    todos.unshift({ id: Date.now() + Math.random(), text: text, completed: false, fresh: true });
    save();
    return true;
  }

  function toggle(id) {
    var t = find(id);
    if (t) { t.completed = !t.completed; save(); }
  }

  function remove(id) {
    todos = todos.filter(function (t) { return t.id !== id; });
    save();
  }

  function update(id, text) {
    text = text.trim();
    if (!text) { remove(id); return; }
    var t = find(id);
    if (t) { t.text = text; save(); }
  }

  function clearDone() {
    todos = todos.filter(function (t) { return !t.completed; });
    save();
  }

  function find(id) {
    return todos.find(function (t) { return t.id === id; });
  }

  /* ── Derived ── */
  function filtered() {
    if (filter === 'active')    return todos.filter(function (t) { return !t.completed; });
    if (filter === 'completed') return todos.filter(function (t) { return t.completed;  });
    return todos;
  }

  function activeCount()    { return todos.filter(function (t) { return !t.completed; }).length; }
  function completedCount() { return todos.filter(function (t) { return  t.completed; }).length; }

  /* ── Render ── */
  function render() {
    var list       = document.getElementById('todo-list');
    var badge      = document.getElementById('active-badge');
    var footerCount= document.getElementById('footer-count');
    var clearBtn   = document.getElementById('clear-btn');
    var ac         = activeCount();
    var cc         = completedCount();

    /* Badge */
    if (ac > 0) {
      badge.textContent = ac + ' 件';
      badge.classList.remove('hidden');
    } else {
      badge.classList.add('hidden');
    }

    /* Footer count */
    if (todos.length === 0) {
      footerCount.textContent = '';
    } else if (ac === 0) {
      footerCount.textContent = 'すべて完了';
    } else {
      footerCount.textContent = ac + ' 件残り';
    }

    /* Clear button */
    clearBtn.disabled = cc === 0;

    /* Filter tabs */
    document.querySelectorAll('.filter-btn').forEach(function (btn) {
      var on = btn.dataset.filter === filter;
      btn.classList.toggle('active', on);
      btn.setAttribute('aria-selected', on ? 'true' : 'false');
    });

    /* List */
    var items = filtered();
    list.innerHTML = '';

    if (items.length === 0) {
      list.appendChild(emptyNode());
    } else {
      items.forEach(function (todo) {
        list.appendChild(itemNode(todo));
        todo.fresh = false; // clear after first render
      });
    }
  }

  /* ── DOM builders ── */
  function emptyNode() {
    var li = document.createElement('li');
    li.className = 'empty';

    var msgs = {
      all:       todos.length === 0
                   ? 'タスクを追加して、今日やることを整理しましょう。'
                   : 'すべてのタスクが完了しました。',
      active:    '未完了のタスクはありません。',
      completed: 'まだ完了したタスクがありません。'
    };

    li.innerHTML =
      '<svg class="empty-icon" viewBox="0 0 36 36" fill="none" stroke="currentColor"' +
      ' stroke-width="1.4" stroke-linecap="round" aria-hidden="true">' +
      '<rect x="7" y="4" width="22" height="28" rx="3"/>' +
      '<line x1="12" y1="12" x2="24" y2="12"/>' +
      '<line x1="12" y1="18" x2="24" y2="18"/>' +
      '<line x1="12" y1="24" x2="19" y2="24"/>' +
      '</svg>' +
      '<p class="empty-text">' + msgs[filter] + '</p>';
    return li;
  }

  function itemNode(todo) {
    var li = document.createElement('li');
    li.className = 'todo-item' + (todo.completed ? ' completed' : '') + (todo.fresh ? ' new-item' : '');

    /* -- Checkbox -- */
    var cb = document.createElement('button');
    cb.className = 'checkbox';
    cb.setAttribute('role', 'checkbox');
    cb.setAttribute('aria-checked', todo.completed ? 'true' : 'false');
    cb.setAttribute('aria-label', todo.completed ? '未完了に戻す' : '完了にする');
    cb.innerHTML =
      '<svg class="checkmark" viewBox="0 0 10 10" aria-hidden="true">' +
      '<polyline points="1.5,5 4,7.5 8.5,2"/></svg>';
    cb.addEventListener('click', function () {
      toggle(todo.id);
      render();
    });

    /* -- Text or edit input -- */
    var wrap = document.createElement('div');
    wrap.className = 'text-wrap';

    if (editing === todo.id) {
      var inp = document.createElement('input');
      inp.type      = 'text';
      inp.className = 'edit-input';
      inp.value     = todo.text;
      inp.maxLength = 200;
      inp.setAttribute('aria-label', 'タスクを編集');

      var commit = function () {
        update(todo.id, inp.value);
        editing = null;
        render();
      };
      inp.addEventListener('keydown', function (e) {
        if (e.key === 'Enter')  { commit(); }
        if (e.key === 'Escape') { editing = null; render(); }
      });
      inp.addEventListener('blur', commit);
      wrap.appendChild(inp);
      setTimeout(function () { inp.focus(); inp.select(); }, 0);
    } else {
      var span = document.createElement('span');
      span.className   = 'todo-text';
      span.textContent = todo.text;
      span.title       = 'ダブルクリックで編集';
      span.addEventListener('dblclick', function () {
        if (todo.completed) return; // don't edit completed
        editing = todo.id;
        render();
      });
      wrap.appendChild(span);
    }

    /* -- Delete -- */
    var del = document.createElement('button');
    del.className = 'delete-btn';
    del.setAttribute('aria-label', '「' + todo.text + '」を削除');
    del.innerHTML =
      '<svg width="13" height="13" viewBox="0 0 13 13" fill="none"' +
      ' stroke="currentColor" stroke-width="1.8" stroke-linecap="round" aria-hidden="true">' +
      '<line x1="1.5" y1="1.5" x2="11.5" y2="11.5"/>' +
      '<line x1="11.5" y1="1.5" x2="1.5" y2="11.5"/></svg>';
    del.addEventListener('click', function () {
      remove(todo.id);
      render();
    });

    li.appendChild(cb);
    li.appendChild(wrap);
    li.appendChild(del);
    return li;
  }

  /* ── Date header ── */
  function renderDate() {
    var el = document.getElementById('today-date');
    var d  = new Date();
    var wd = ['日', '月', '火', '水', '木', '金', '土'];
    el.textContent =
      d.getFullYear() + '年 ' +
      (d.getMonth() + 1) + '月 ' +
      d.getDate() + '日（' + wd[d.getDay()] + '）';
  }

  /* ── Wiring ── */
  document.getElementById('add-btn').addEventListener('click', function () {
    var inp = document.getElementById('new-todo');
    if (add(inp.value)) { inp.value = ''; render(); }
    inp.focus();
  });

  document.getElementById('new-todo').addEventListener('keydown', function (e) {
    if (e.key !== 'Enter') return;
    if (add(this.value)) { this.value = ''; render(); }
  });

  document.querySelectorAll('.filter-btn').forEach(function (btn) {
    btn.addEventListener('click', function () {
      filter  = btn.dataset.filter;
      editing = null;
      render();
    });
  });

  document.getElementById('clear-btn').addEventListener('click', function () {
    clearDone();
    render();
  });

  /* ── Boot ── */
  load();
  renderDate();
  render();

}());
</script>

</body>
</html>
